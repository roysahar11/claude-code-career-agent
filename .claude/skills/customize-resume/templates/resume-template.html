<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NAME}} - Resume</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e40af;
            --text-dark: #111827;
            --text-body: #374151;
            --text-muted: #6b7280;
            --border: #e5e7eb;
        }

        @page {
            size: A4;
            margin: 0;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            font-weight: 300;
            font-size: 10.5pt;
            line-height: 1.35;
            letter-spacing: 0.01em;
            color: var(--text-body);
            background: white;
            -webkit-font-smoothing: antialiased;
            text-wrap: pretty;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 8mm 10mm;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .name {
            font-family: 'Open Sans', sans-serif;
            font-size: 28pt;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 4px;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 4px;
        }

        .title {
            font-family: 'Open Sans', sans-serif;
            font-size: 11pt;
            font-weight: 300;
            color: var(--text-muted);
            font-style: italic;
            letter-spacing: 1px;
        }

        .header-right {
            text-align: right;
            font-size: 10.5pt;
            color: var(--text-body);
            line-height: 1.6;
        }

        .header-right a {
            color: var(--primary);
            text-decoration: underline;
            text-underline-offset: 1px;
            white-space: nowrap;
        }

        .contact-row {
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 3px;
        }

        .icon {
            width: 16px;
            height: 16px;
            color: var(--text-dark);
            flex-shrink: 0;
        }

        /* ===== SUMMARY ===== */
        .summary {
            font-size: 10.5pt;
            color: var(--primary);
            line-height: 1.35;
            margin-bottom: 6px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border);
        }

        /* ===== BODY ===== */
        .body {
            display: grid;
            grid-template-columns: 195px 1fr;
            gap: 18px;
            flex: 1;
        }

        /* ===== SECTION TITLES ===== */
        .section-title, .sidebar-title {
            font-size: 9pt;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dark);
            margin-bottom: 5px;
            padding-bottom: 2px;
            border-bottom: 2px solid var(--primary);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden;
        }

        /* Prevent nowrap spans from overflowing narrow sidebar */
        .sidebar .nowrap {
            white-space: normal;
        }

        .skill-item {
            margin-bottom: 3px;
            font-size: 10pt;
            line-height: 1.3;
        }

        .skill-item .keyword {
            font-weight: 400;
        }

        .skill-item strong {
            color: var(--primary);
            font-weight: 600;
        }

        /* Ensure bold text stands out against light body */
        strong, b {
            font-weight: 600;
        }

        .certification-item {
            margin-bottom: 3px;
            font-size: 10pt;
            line-height: 1.3;
        }

        .nowrap {
            white-space: nowrap;
        }

        .education-item {
            margin-bottom: 2px;
        }

        .edu-row {
            font-size: 10pt;
            line-height: 1.3;
        }

        .edu-year {
            font-size: 9pt;
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }

        .edu-year::after {
            content: " | ";
            color: var(--text-muted);
        }

        .edu-title {
            color: var(--text-dark);
        }

        .edu-description {
            font-size: 10pt;
            color: var(--text-muted);
            font-style: italic;
            line-height: 1.3;
        }

        .education-year {
            font-size: 9pt;
            font-style: italic;
            color: var(--text-muted);
        }

        .education-title {
            font-size: 10pt;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .hobbies {
            font-size: 10pt;
            line-height: 1.3;
        }

        .flex-item {
            margin-bottom: 2px;
        }

        .flex-item-org {
            font-size: 9pt;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .flex-item-description {
            font-size: 10pt;
            color: var(--text-body);
            line-height: 1.3;
        }

        .flex-text {
            font-size: 10pt;
            line-height: 1.3;
        }

        /* ===== EXPERIENCE ===== */
        .experience-item {
            margin-bottom: 6px;
        }

        .experience-title-row {
            display: flex;
            align-items: baseline;
            gap: 5px;
            flex-wrap: wrap;
        }

        .experience-date {
            font-size: 10pt;
            font-weight: 600;
            color: var(--primary);
        }

        .experience-date::after {
            content: " |";
            color: var(--text-muted);
        }

        .experience-role {
            font-size: 10.5pt;
            font-weight: 600;
            color: var(--primary);
        }

        .experience-company {
            font-size: 9pt;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .experience-bullets {
            list-style: disc;
            padding-left: 14px;
            font-size: 10pt;
            line-height: 1.35;
            margin-top: 2px;
        }

        .experience-bullets li {
            margin-bottom: 1px;
            padding-left: 2px;
        }

        .highlight {
            font-weight: 600;
            color: var(--text-dark);
        }

        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .page { padding: 8mm 10mm; }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="header">
            <div class="header-left">
                <h1 class="name">{{NAME}}</h1>
                <p class="title">{{TITLE}}</p>
            </div>
            <div class="header-right">
                <div class="contact-row">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                    {{PHONE}} &nbsp;·&nbsp;
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                    {{EMAIL}}
                </div>
                <div class="contact-row">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
                    <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a> &nbsp;·&nbsp;
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    <a href="{{GITHUB_URL}}">{{GITHUB_DISPLAY}}</a>
                </div>
            </div>
        </header>

        <p class="summary">{{SUMMARY}}</p>

        <div class="body">
            <aside class="sidebar">
                {{SKILLS_SECTION}}
                {{EDUCATION_SECTION}}
                {{CERTIFICATIONS_SECTION}}
                {{HOBBIES_SECTION}}
                {{MILITARY_SERVICE_SECTION}}
            </aside>

            <main class="main">
                <h2 class="section-title">Experience</h2>
                {{EXPERIENCE_CONTENT}}
            </main>
        </div>
    </div>
</body>
</html>
